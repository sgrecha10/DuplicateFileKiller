services:
  django:
    container_name: ${COMPOSE_PROJECT_NAME}_django
    image: ${COMPOSE_PROJECT_NAME}_python
    build:
      context: .
      dockerfile: Dockerfile
    logging:
      driver: "json-file"
    networks:
      - default
    volumes:
      - ./src:/app
      - /home:/home
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    expose:
      - "8000"
    command: python3 manage.py runserver 0.0.0.0:8000
    depends_on:
      - postgres_db

  postgres_db:
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    hostname: postgres
    image: postgres:14.1-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    ports:
      - "5432:5432"
    networks:
      - default
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "temp_file_limit=10GB"
      - "-c"
      - "log_min_duration_statement=200ms"
      - "-c"
      - "idle_in_transaction_session_timeout=10s"
      - "-c"
      - "lock_timeout=1s"
      - "-c"
      - "statement_timeout=60s"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      - POSTGRES_DB=duplicate_file_killer
      - POSTGRES_USER=duplicate_file_killer
      - POSTGRES_PASSWORD=duplicate_file_killer
      - POSTGRES_PORT=5432

networks:
  default:
    name: duplicate_file_killer
    driver: bridge

volumes:
  duplicate_file_killer:
